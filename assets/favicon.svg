<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="6" fill="#7C8B6F"/>
  <!-- Stem (vertical bar of "d", ascender + tail) -->
  <rect x="21" y="3.5" width="3.5" height="25" rx="1.5" fill="white"/>
  <!-- Top face (lightest) -->
  <polygon points="13,7 21,11 13,15 5,11" fill="white"/>
  <!-- Right face (medium) -->
  <polygon points="21,11 21,20 13,24 13,15" fill="white" fill-opacity="0.82"/>
  <!-- Left face (darkest) -->
  <polygon points="5,11 13,15 13,24 5,20" fill="white" fill-opacity="0.48"/>
</svg>
